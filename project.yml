name: Flark
options:
  bundleIdPrefix: app.flark
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans
  knownRegions: [zh-Hans, en, Base]

packages:
  FlarkKit:
    path: Packages/FlarkKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Flark:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Flark
        excludes:
          - "Resources/Emoji"
          - "Info.plist"
      - path: Flark/Resources/Emoji
        type: folder
      - path: FlarkShared
    dependencies:
      - package: FlarkKit
      - target: FlarkSyncActivityWidget
        embed: true
        codeSign: true
        link: false
    # Custom Info.plist (xcodegen-managed). Switched away from
    # `GENERATE_INFOPLIST_FILE: YES` because URL schemes can't be expressed via
    # the scalar `INFOPLIST_KEY_*` build settings — we need a real plist file
    # to host the nested `CFBundleURLTypes` array for `flark://` invite links.
    info:
      path: Flark/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: app.flark.invite
            CFBundleURLSchemes: [flark]
        NSCameraUsageDescription: "用于拍摄并插入图片到话题与回复。"
        NSPhotoLibraryUsageDescription: "用于选择并插入图片到话题与回复。"
        NSSupportsLiveActivities: true
        LSApplicationCategoryType: "public.app-category.productivity"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.flark.bogota
        PRODUCT_NAME: Flark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO

  FlarkSyncActivityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: FlarkSyncActivityWidget
        excludes:
          - "Info.plist"
      - path: FlarkShared
    info:
      path: FlarkSyncActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Flark Sync
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.flark.bogota.SyncWidget
        PRODUCT_NAME: FlarkSyncActivityWidget
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

schemes:
  Flark:
    build:
      targets:
        Flark: all
